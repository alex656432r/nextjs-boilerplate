<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Закрытый форум сообщества</title>
    <style>
        body { background: #121212; color: #fff; font-family: -apple-system, BlinkMacSystemFont, Roboto, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; display: none; }
        h1 { border-bottom: 1px solid #222; padding-bottom: 15px; font-size: 28px; display: flex; justify-content: space-between; align-items: center; }
        .post { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative; }
        .login-box { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); text-align: center; margin-top: 100px; width: 100%; max-width: 350px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; background: #2a2a2a; color: #fff; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; padding: 12px; background: #2174c7; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        button:hover { background: #2174c7; opacity: 0.9; }
        .logout-btn { width: auto; padding: 5px 10px; background: #c0392b; font-size: 14px; margin: 0; }
        .backup-zone { display: flex; gap: 10px; margin-top: 20px; }
        .backup-btn { background: #27ae60; margin: 0; }
        .meta { color: #777; font-size: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .badge { background: #34495e; padding: 2px 8px; border-radius: 3px; color: #ecf0f1; font-weight: bold; }
        .error-msg { color: #ff4a4a; font-size: 14px; margin-top: 10px; display: none; }
        .filter-bar { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-top: 20px; display: flex; gap: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <!-- ОКНО ВХОДА -->
    <div class="login-box" id="loginBox">
        <h2>Личный доступ</h2>
        <p style="color: #777; font-size: 14px;">Введите секретный пароль для входа на форум</p>
        <input type="password" id="passwordInput" placeholder="Ваш пароль..." onkeydown="if(event.key === 'Enter') checkPassword()">
        <button onclick="checkPassword()">Войти</button>
        <div class="error-msg" id="errorMsg">Неверный пароль! Доступ заблокирован.</div>
    </div>

    <!-- ОСНОВНОЙ ФОРУМ -->
    <div class="container" id="forumContainer">
        <h1>
            🔒 Мой Личный Форум 
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </h1>

        <!-- Форма добавления записей -->
        <div class="post">
            <h3>Создать новую запись</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="topicTitle" placeholder="Заголовок темы / заметки..." style="flex: 2;">
                <select id="topicCategory" style="flex: 1;">
                    <option value="Общее">📁 Общее</option>
                    <option value="Личное">🔒 Личное</option>
                    <option value="Пароли">🔑 Пароли / Доступы</option>
                    <option value="Ссылки">🔗 Полезные ссылки</option>
                    <option value="Идеи">💡 Идеи / Проекты</option>
                </select>
            </div>
            <textarea id="topicText" placeholder="Текст вашей секретной записи..."></textarea>
            <button onclick="createTopic()">Сохранить на форуме</button>
        </div>

        <!-- Панель фильтров и поиска -->
        <div class="filter-bar">
            <select id="filterCategory" onchange="loadTopics()" style="margin:0; flex: 1;">
                <option value="Все">🔍 Все категории</option>
                <option value="Общее">📁 Общее</option>
                <option value="Личное">🔒 Личное</option>
                <option value="Пароли">🔑 Пароли</option>
                <option value="Ссылки">🔗 Ссылки</option>
                <option value="Идеи">💡 Идеи</option>
            </select>
            <input type="text" id="searchQuery" oninput="loadTopics()" placeholder="Поиск по тексту..." style="margin:0; flex: 2;">
        </div>

        <!-- Лента тем -->
        <div id="topicsList"></div>

        <!-- Зона бэкапа -->
        <div class="backup-zone">
            <button class="backup-btn" onclick="exportBackup()">💾 Скачать бэкап (.json)</button>
        </div>
    </div>

    <script>
        // Пароль: Px3#WkdDnkab6B;
        const passArray = ['P','x','3','#','W','k','d','D','n','k','a','b','6','B',';'];
        const CORRECT_PASSWORD = passArray.join('');

        if (sessionStorage.getItem('forum_authenticated') === 'true') {
            showForum();
        }

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const error = document.getElementById('errorMsg');
            if (input.toString() === CORRECT_PASSWORD.toString()) {
                sessionStorage.setItem('forum_authenticated', 'true');
                showForum();
            } else {
                error.style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }

        function showForum() {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('forumContainer').style.display = 'block';
            loadTopics();
        }

        function logout() {
            sessionStorage.removeItem('forum_authenticated');
            window.location.reload();
        }

        function createTopic() {
            const title = document.getElementById('topicTitle').value.trim();
            const text = document.getElementById('topicText').value.trim();
            const category = document.getElementById('topicCategory').value;
            
            if (!title || !text) return alert('Заполните заголовок и text!');

            const topics = JSON.parse(localStorage.getItem('my_private_forum_data')) || [];
            topics.unshift({
                id: Date.now(),
                title: title,
                text: text,
                category: category,
                date: new Date().toLocaleString('ru-RU')
            });
            localStorage.setItem('my_private_forum_data', JSON.stringify(topics));

            document.getElementById('topicTitle').value = '';
            document.getElementById('topicText').value = '';
            loadTopics();
        }

        function loadTopics() {
            const list = document.getElementById('topicsList');
            const topics = JSON.parse(localStorage.getItem('my_private_forum_data')) || [];
            const selectedCategory = document.getElementById('filterCategory').value;
            const searchQuery = document.getElementById('searchQuery').value.toLowerCase().trim();
            
            list.innerHTML = '';

            const filteredTopics = topics.filter(topic => {
                const matchesCategory = (selectedCategory === 'Все' || topic.category === selectedCategory);
                const matchesSearch = (topic.title.toLowerCase().includes(searchQuery) || topic.text.toLowerCase().includes(searchQuery));
                return matchesCategory && matchesSearch;
            });

            if (filteredTopics.length === 0) {
                list.innerHTML = '<p style="color: #555; text-align: center; margin-top: 30px;">Ничего не найдено.</p>';
                return;
            }

            filteredTopics.forEach(topic => {
                list.innerHTML += `
                    <div class="post">
                        <div class="meta">
                            <span>📅 ${topic.date}</span>
                            <span class="badge">${topic.category || 'Общее'}</span>
                        </div>
                        <h3 style="margin: 0 0 10px 0; color: #2174c7;">${topic.title}</h3>
                        <p style="margin: 0; line-height: 1.6; white-space: pre-wrap;">${topic.text}</p>
                        <span style="position: absolute; right: 15px; top: 15px; color: #ff4a4a; cursor: pointer; font-size: 12px;" onclick="deleteTopic(${topic.id})">❌ Удалить</span>
                    </div>
                `;
            });
        }

        function deleteTopic(id) {
            if (confirm('Удалить эту запись?')) {
                let topics = JSON.parse(localStorage.getItem('my_private_forum_data')) || [];
                topics = topics.filter(t => t.id !== id);
                localStorage.setItem('my_private_forum_data', JSON.stringify(topics));
                loadTopics();
            }
        }

        function exportBackup() {
            const data = localStorage.getItem('my_private_forum_data');
            if (!data || data === '[]') return alert('Нет данных для сохранения!');
            const blob = new Blob([data], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `forum_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }
    </script>
</body>
</html>
