<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔒 Закрытый форум сообщества</title>
  <style>
    body { background: #121212; color: #fff; font-family: -apple-system, BlinkMacSystemFont, Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 30px; margin: 0; }
    .container { width: 100%; max-width: 800px; display: none; }
    h1 { border-bottom: 1px solid #222; padding-bottom: 15px; font-size: 28px; }
    .post { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .login-box { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); text-align: center; width: 300px; margin-top: 15vh; }
    input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #333; background: #2a2a2a; color: #fff; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #2787e5; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
    button:hover { background: #2174c7; }
    .vk-player-wrapper { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; cursor: pointer; overflow: hidden; border-radius: 4px; margin-top: 15px; }
    .rumble-iframe { width: 100% !important; height: 100% !important; position: absolute; top: 0; left: 0; z-index: 1; border: none; }
    .vk-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.3s ease; }
    .vk-top-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 12px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); color: #fff; font-size: 14px; display: flex; align-items: center; box-sizing: border-box; }
    .vk-logo { width: 20px; height: 20px; margin-right: 10px; }
    .vk-play-btn { width: 64px; height: 64px; background: rgba(0, 0, 0, 0.7); border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: transform 0.2s ease, background 0.2s ease; }
    .vk-player-wrapper:hover .vk-play-btn { transform: scale(1.1); background: #2787e5; }
  </style>
</head>
<body>

  <!-- ФОРМА ВВОДА ПАРОЛЯ -->
  <div class="login-box" id="loginBox">
    <h2>Доступ ограничен</h2>
    <p style="color: #888; font-size: 14px;">Введите секретный пароль для входа на форум</p>
    <input type="password" id="pass" placeholder="Пароль">
    <button onclick="checkPassword()">Войти</button>
  </div>

  <!-- КОНТЕНТ ФОРУМА -->
  <div class="container" id="forumContainer">
    <h1>🔒 Закрытый форум сообщества</h1>
    <div class="post">
      <h3>Тема: Наш видеоплеер Rumble</h3>
      <p style="color: #aaa; font-size: 14px;">Опубликовано: Только что | Автор: Администратор</p>
      <div class="vk-player-wrapper" id="playerWrapper" onclick="startVideo()">
        <iframe class="rumble-iframe" src="https://rumble.com" allowfullscreen></iframe>
        <div class="vk-overlay" id="vkOverlay">
          <div class="vk-top-bar">
            <img class="vk-logo" src="https://wikimedia.org" alt="VK">
            <div class="vk-video-title">Видеоролик Rumble</div>
          </div>
          <div class="vk-play-btn"><svg viewBox="0 0 24 24" width="36" height="36" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SECRET = "Px3#WkdDnkab6B;";
    if (localStorage.getItem("forum_auth") === SECRET) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("forumContainer").style.display = "block";
    }
    function checkPassword() {
      const input = document.getElementById("pass").value;
      if (input === SECRET) {
        localStorage.setItem("forum_auth", SECRET);
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("forumContainer").style.display = "block";
      } else {
        alert("Неверный пароль!");
      }
    }
    function startVideo() {
      var overlay = document.getElementById('vkOverlay');
      overlay.style.opacity = '0';
      setTimeout(function() { overlay.style.display = 'none'; }, 300);
    }
  </script>
</body>
</html>
