<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Закрытый плеер</title>
  <style>
    body { background: #121212; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .login-box { background: #1e1e1e; padding: 30px; border-radius: 8px; text-align: center; width: 300px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #333; background: #2a2a2a; color: #fff; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #2787e5; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
    .player-container { display: none; width: 100%; max-width: 720px; aspect-ratio: 16 / 9; background: #000; border-radius: 6px; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>

  <!-- ОКНО ВВОД ПАРОЛЯ -->
  <div class="login-box" id="loginBox">
    <h2>Доступ ограничен</h2>
    <input type="password" id="pass" placeholder="Введите пароль">
    <button onclick="check()">Войти</button>
  </div>

  <!-- САМ ПЛЕЕР (ОТКРОЕТСЯ ПОСЛЕ ВВОДА) -->
  <div class="player-container" id="player">
    <iframe src="https://youtube.com" allowfullscreen></iframe>
  </div>

  <script>
    const SECRET = "Px3#WkdDnkab6B;";

    // Если уже входили ранее — сразу показываем видео
    if (localStorage.getItem("forum_auth") === SECRET) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("player").style.display = "block";
    }

    function check() {
      const input = document.getElementById("pass").value;
      if (input === SECRET) {
        localStorage.setItem("forum_auth", SECRET);
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("player").style.display = "block";
      } else {
        alert("Неверный пароль!");
      }
    }
  </script>

</body>
</html>
