<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Закрытый форум сообщества</title>
    <style>
        body { background: #121212; color: #fff; font-family: -apple-system, BlinkMacSystemFont, Roboto, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; display: none; }
        h1 { border-bottom: 1px solid #222; padding-bottom: 15px; font-size: 28px; display: flex; justify-content: space-between; align-items: center; }
        .post { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative; }
        .login-box { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); text-align: center; margin-top: 100px; width: 100%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #333; background: #2a2a2a; color: #fff; border-radius: 4px; box-sizing: border-box; }
        textarea { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #333; background: #2a2a2a; color: #fff; border-radius: 4px; box-sizing: border-box; height: 100px; resize: vertical; }
        button { width: 100%; padding: 12px; background: #2174c7; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        button:hover { background: #2174c7; opacity: 0.9; }
        .logout-btn { width: auto; padding: 5px 10px; background: #c0392b; font-size: 14px; margin: 0; }
        .backup-btn { background: #27ae60; margin-top: 15px; }
        .meta { color: #777; font-size: 12px; margin-bottom: 10px; }
        .error-msg { color: #ff4a4a; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <!-- ОКНО ВХОДА -->
    <div class="login-box" id="loginBox">
        <h2>Личный доступ</h2>
        <p style="color: #777; font-size: 14px;">Введите секретный пароль для входа на форум</p>
        <input type="password" id="passwordInput" placeholder="Ваш пароль..." onkeydown="if(event.key === 'Enter') checkPassword()">
        <button onclick="checkPassword()">Войти</button>
        <div class="error-msg" id="errorMsg">Неверный пароль! Доступ заблокирован.</div>
    </div>

    <!-- ОСНОВНОЙ ФОРУМ -->
    <div class="container" id="forumContainer">
        <h1>
            🔒 Мой Личный Форум 
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </h1>

        <div class="post">
            <h3>Создать новую запись</h3>
            <input type="text" id="topicTitle" placeholder="Заголовок темы / заметки...">
            <textarea id="topicText" placeholder="Текст вашей секретной записи..."></textarea>
            <button onclick="createTopic()">Сохранить на форуме</button>
        </div>

        <div id="topicsList"></div>
        <button class="backup-btn" onclick="exportBackup()">💾 Скачать резервную копию данных (Файл .json)</button>
    </div>

    <script>
        // Безопасное символьное объявление вашего точного пароля
        const passArray = ['P','x','3','#','W','k','d','D','n','k','a','b','6','B',';'];
        const CORRECT_PASSWORD = passArray.join('');

        if (sessionStorage.getItem('forum_authenticated') === 'true') {
            showForum();
        }

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const error = document.getElementById('errorMsg');
            
            // Прямое посимвольное сравнение строк во избежание багов парсинга
            if (input.toString() === CORRECT_PASSWORD.toString()) {
                sessionStorage.setItem('forum_authenticated', 'true');
                showForum();
            } else {
                error.style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }

        function showForum() {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('forumContainer').style.display = 'block';
            loadTopics();
        }

        function logout() {
            sessionStorage.removeItem('forum_authenticated');
            window.location.reload();
        }

        function createTopic() {
            const title = document.getElementById('topicTitle').value.trim();
            const text = document.getElementById('topicText').value.trim();
            if (!title || !text) return alert('Заполните заголовок и текст!');

            const topics = JSON.parse(localStorage.getItem('my_private_forum_data')) || [];
            topics.unshift({ id: Date.now(), title: title, text: text, date: new Date().toLocaleString('ru-RU') });
            localStorage.setItem('my_private_forum_data', JSON.stringify(topics));

            document.getElementById('topicTitle').value = '';
            document.getElementById('topicText').value = '';
            loadTopics();
        }

        function loadTopics() {
            const list = document.getElementById('topicsList');
            const topics = JSON.parse(localStorage.getItem('my_private_forum_data')) || [];
            list.innerHTML = '';
            if (topics.length === 0) {
                list.innerHTML = '<p style="color: #555; text-align: center; margin-top: 30px;">Здесь пока нет ни одной приватной записи.</p>';
                return;
            }
            topics.forEach(topic => {
                list.innerHTML += `
                    <div class="post">
                        <div class="meta">Создано: ${topic.date}</div>
                        <h3 style="margin: 0 0 10px 0; color: #2174c7;">${topic.title}</h3>
                        <p style="margin: 0; line-height: 1.6; white-space: pre-wrap;">${topic.text}</p>
                        <span style="position: absolute; right: 15px; top: 15px; color: #ff4a4a; cursor: pointer; font-size: 12px;" onclick="deleteTopic(${topic.id})">❌ Удалить</span>
                    </div>
                `;
            });
        }

        function deleteTopic(id) {
            if (confirm('Вы уверены, что хотите удалить эту запись?')) {
                let topics = JSON.parse(localStorage.getItem('my_private_forum_data')) || [];
                topics = topics.filter(t => t.id !== id);
                localStorage.setItem('my_private_forum_data', JSON.stringify(topics));
                loadTopics();
            }
        }

        function exportBackup() {
            const data = localStorage.getItem('my_private_forum_data');
            if (!data || data === '[]') return alert('Нет данных для сохранения!');
            const blob = new Blob([data], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `forum_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }
    </script>
</body>
</html>
