<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔒 Закрытый форум сообщества</title>
  <style>
    body { background: #121212; color: #fff; font-family: -apple-system, BlinkMacSystemFont, Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 30px; margin: 0; }
    .container { width: 100%; max-width: 800px; display: none; }
    h1 { border-bottom: 1px solid #222; padding-bottom: 15px; font-size: 28px; }
    .post { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .login-box { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); text-align: center; width: 300px; margin-top: 15vh; }
    input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #333; background: #2a2a2a; color: #fff; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #2787e5; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
    button:hover { background: #2174c7; }
    .video-wrapper { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 4px; margin-top: 15px; overflow: hidden; }
    .video-wrapper iframe { width: 100%; height: 100%; border: none; }
    .video-placeholder { display: flex; justify-content: center; align-items: center; height: 100%; background: #1a1a1a; color: #666; flex-direction: column; gap: 20px; }
    .video-placeholder .play-icon { font-size: 48px; opacity: 0.5; }
    .video-placeholder .video-title { font-size: 18px; color: #888; }
  </style>
</head>
<body>

  <div class="login-box" id="loginBox">
    <h2>Доступ ограничен</h2>
    <p style="color: #888; font-size: 14px;">Введите секретный пароль для входа на форум</p>
    <input type="password" id="pass" placeholder="Пароль" onkeydown="if(event.key==='Enter') checkPassword()">
    <button onclick="checkPassword()">Войти</button>
    <p id="errorMsg" style="color: #ff4444; font-size: 14px; margin-top: 10px; display: none;">Неверный пароль!</p>
  </div>

  <div class="container" id="forumContainer">
    <h1>🔒 Закрытый форум сообщества</h1>
    <div class="post">
      <h3>Тема: Наш видеоплеер</h3>
      <p style="color: #aaa; font-size: 14px;">Опубликовано: Только что | Автор: Администратор</p>
      
      <div class="video-wrapper" id="videoWrapper">
        <!-- Плейсхолдер, который заменится на видео после клика -->
        <div class="video-placeholder" id="videoPlaceholder">
          <div class="play-icon">▶</div>
          <div class="video-title">Нажмите для просмотра видео</div>
        </div>
        <!-- Сюда будет загружаться iframe -->
        <div id="videoContainer" style="display: none; width: 100%; height: 100%;"></div>
      </div>
      
      <p style="color: #666; font-size: 12px; margin-top: 10px;">⚠️ Видео загружается по требованию для экономии трафика</p>
    </div>
  </div>

  <script>
    // ⚠️ ВАЖНО: В реальном проекте используйте серверную аутентификацию!
    // Это только для демонстрации
    const SECRET = "Px3#WkdDnkab6B;";
    const SECRET_HASH = btoa(SECRET); // Простое хеширование для примера
    
    // Проверка аутентификации
    if (localStorage.getItem("forum_auth") === SECRET_HASH) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("forumContainer").style.display = "block";
    }

    function checkPassword() {
      const input = document.getElementById("pass").value;
      const errorMsg = document.getElementById("errorMsg");
      
      if (input === SECRET) {
        localStorage.setItem("forum_auth", SECRET_HASH);
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("forumContainer").style.display = "block";
        errorMsg.style.display = "none";
      } else {
        errorMsg.style.display = "block";
        // Очищаем поле ввода
        document.getElementById("pass").value = "";
        document.getElementById("pass").focus();
      }
    }

    // Функция загрузки видео по клику
    function loadVideo() {
      const placeholder = document.getElementById('videoPlaceholder');
      const container = document.getElementById('videoContainer');
      
      if (placeholder.style.display !== 'none') {
        placeholder.style.display = 'none';
        container.style.display = 'block';
        
        // Вставка iframe с видео
        // Замените VIDEO_ID на реальный ID видео из Rumble
        const videoId = 'VIDEO_ID'; // Например: 'v3v3v3'
        container.innerHTML = `
          <iframe 
            src="https://rumble.com/embed/${videoId}/?pub=4" 
            allowfullscreen
            loading="lazy"
          ></iframe>
        `;
        
        // Альтернатива: если видео нет, можно вставить тестовое
        // container.innerHTML = `<video controls style="width:100%;height:100%;"><source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"></video>`;
      }
    }

    // Обработчик клика по обертке видео
    document.getElementById('videoWrapper').addEventListener('click', loadVideo);
    
    // Также можно добавить кнопку в плейсхолдер
    document.getElementById('videoPlaceholder').addEventListener('click', loadVideo);
  </script>
</body>
</html>
